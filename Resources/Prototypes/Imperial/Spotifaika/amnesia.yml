- type: entity
  parent: XenoStructuralGelBase
  id: AmnesiaFleshTile
  name: fibres of flesh
  description: Fleshy organic sediment that pulsates slightly.
  suffix: Amnesia, Spotifaika
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
    - type: Sprite
      sprite: Imperial/Spotifaika/Amnesia/flesh.rsi
      layers:
        - state: icon-1
    - type: Destructible
      thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 900
        behaviors:
        - !type:DoActsBehavior
          acts: [ "Destruction" ]

